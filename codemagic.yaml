workflows:
  ios-workflow:
    name: iOS Build Workflow
    instance_type: mac_mini_m2
    max_build_duration: 10
    scripts:
      - name: Force Compile
        script: |
          # 1. Programmcode zusammenbauen
          xcrun -sdk iphoneos swiftc \
            -target arm64-apple-ios15.0 \
            -o IriunClone \
            *.swift
          
          # 2. Struktur aufbauen
          mkdir -p Payload/IriunClone.app
          cp IriunClone Payload/IriunClone.app/
          
          # 3. Info.plist sicherstellen
          find . -maxdepth 1 -iname "info.plist" -exec cp {} Payload/IriunClone.app/Info.plist \;
          
          # 4. Hilfsdateien für das System erstellen
          echo "APPL????" > Payload/IriunClone.app/PkgInfo
          chmod +x Payload/IriunClone.app/IriunClone
          
          # 5. Verpacken
          zip -r IriunClone.ipa Payload
    artifacts:
      - "*.ipa"
