# Codemagic Konfiguration für IriunClone iOS
workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_credentials
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd ios
          xcodegen generate

      - name: Build iOS App (IPA)
        script: |
          cd ios
          xcode-project build-ipa \
            --project "IriunClone.xcodeproj" \
            --scheme "IriunClone"

    artifacts:
      - ios/build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - can.inneci2001@gmail.com # Hier deine E-Mail eintragen