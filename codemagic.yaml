workflows:
  ios-workflow:
    name: iOS Build Workflow
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Build App Binary
        script: |
          # Wir bauen nur die .app Datei, das reicht für Sideloadly
          xcodebuild build \
            -project IriunClone.xcodeproj \
            -scheme IriunClone \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build
      - name: Package IPA
        script: |
          # Wir packen die App manuell in das richtige Format
          mkdir -p Payload
          cp -r build/Build/Products/Debug-iphoneos/IriunClone.app Payload/
          zip -r IriunClone.ipa Payload
    artifacts:
      - "*.ipa"
