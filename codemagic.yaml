workflows:
  ios-workflow:
    name: iOS Build Workflow
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project IriunClone.xcodeproj \
            --scheme IriunClone
    artifacts:
      - build/ios/ipa/*.ipa
