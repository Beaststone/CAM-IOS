workflows:
  ios-workflow:
    name: iOS Build Workflow
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Build with Single File
        script: |
          # Wir erstellen eine temporäre App-Struktur
          mkdir -p IriunClone.app
          # Wir kompilieren die Hauptdatei direkt zur "Executable"
          swiftc -sdk $(xcrun --sdk iphoneos --show-sdk-path) -target arm64-apple-ios15.0 IriunCloneApp.swift StreamController.swift VideoStreamClient.swift -o IriunClone.app/IriunClone
          # Wir kopieren die Info.plist dazu
          cp Info.plist IriunClone.app/
          # Wir verpacken es für Sideloadly
          mkdir Payload
          cp -r IriunClone.app Payload/
          zip -r IriunClone.ipa Payload
    artifacts:
      - "*.ipa"
