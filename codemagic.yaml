workflows:
  ios-workflow:
    name: iOS Build Workflow
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Create Xcode Project and Build
        script: |
          # Dieses Tool erstellt aus deinen Dateien ein echtes Projekt
          pip install swift-project-generator
          swift-project-generator --name IriunClone --path .
          
          # Jetzt bauen wir die echte IPA mit dem Apple-Compiler
          xcode-project build-ipa \
            --project IriunClone.xcodeproj \
            --scheme IriunClone
    artifacts:
      - build/ios/ipa/*.ipa
