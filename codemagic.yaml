workflows:
  ios-workflow:
    name: iOS Build Workflow
    instance_type: mac_mini_m2
    max_build_duration: 10
    scripts:
      - name: Compile App Binary
        script: |
          # Wir kompilieren ALLE Swift-Dateien zu einer echten ausführbaren Datei
          xcrun -sdk iphoneos swiftc \
            -target arm64-apple-ios15.0 \
            -o IriunClone \
            *.swift
          
          # Wir bauen die Struktur für Sideloadly
          mkdir -p Payload/IriunClone.app
          mv IriunClone Payload/IriunClone.app/
          
          # Wir stellen sicher, dass die Info.plist richtig geschrieben wird
          if [ -f "info.plist" ]; then
            cp info.plist Payload/IriunClone.app/Info.plist
          elif [ -f "Info.plist" ]; then
            cp Info.plist Payload/IriunClone.app/Info.plist
          fi
          
          # Verpacken als IPA
          zip -r IriunClone.ipa Payload
    artifacts:
      - "*.ipa"
