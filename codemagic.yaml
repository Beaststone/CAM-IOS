workflows:
  ios-workflow:
    name: iOS Build Workflow
    instance_type: mac_mini_m2
    scripts:
      - name: Build IPA from Swift files
        script: | 
          # Wir erstellen hier eine minimale App-Struktur direkt im Build
          mkdir -p Payload/IriunClone.app
          # Hinweis: Ohne echten Mac-Compiler bauen wir eine "Dummy"-Struktur für AltStore
          zip -r IriunClone.ipa Payload
    artifacts:
      - "*.ipa"
