workflows:
  ios-workflow:
    name: iOS Build Workflow
    instance_type: mac_mini_m2
    max_build_duration: 15
    scripts:
      - name: Create Real Xcode Project
        script: |
          # Wir nutzen ein Tool, um aus deinen Swift-Dateien ein echtes Projekt zu bauen
          # Das verhindert den "damaged project" Fehler
          swift package init --type executable --name IriunClone
          
          # Wir kopieren deine echten Dateien in das neue Paket
          cp *.swift Sources/IriunClone/
          
          # Jetzt bauen wir die App als echte Binärdatei
          swift build -c release --triple arm64-apple-ios15.0-simulator
          
          # Wir bauen die IPA-Struktur händisch, aber mit der echten Datei
          mkdir -p Payload/IriunClone.app
          cp .build/arm64-apple-ios15.0-simulator/release/IriunClone Payload/IriunClone.app/
          find . -maxdepth 1 -iname "info.plist" -exec cp {} Payload/IriunClone.app/Info.plist \;
          
          zip -r IriunClone.ipa Payload
    artifacts:
      - "*.ipa"
