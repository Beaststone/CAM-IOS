# Codemagic Konfiguration für IriunClone iOS
workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_credentials
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          # Wir befinden uns bereits im ios-Ordner des Repos
          xcodegen generate

      - name: Build unsigned iOS App (IPA für Sideloadly/AltStore)
        script: |
          set -e

          # Unsigned Build (Code Signing deaktiviert)
          xcodebuild \
            -project IriunClone.xcodeproj \
            -scheme IriunClone \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT=build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build

          # IPA manuell packen
          mkdir -p build/ipa/Payload
          cp -R build/Release-iphoneos/IriunClone.app build/ipa/Payload/
          cd build/ipa
          zip -r IriunClone-unsigned.ipa Payload

    artifacts:
      - build/ipa/*.ipa

    publishing:
      email:
        recipients:
          - can.inneci2001@gmail.com # Hier deine E-Mail eintragen