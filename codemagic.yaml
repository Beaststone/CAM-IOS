workflows:
  ios-workflow:
    name: iOS Build Workflow
    instance_type: mac_mini_m2
    max_build_duration: 10
    scripts:
      - name: Compile App Binary
        script: |
          # 1. Wir nehmen alle deine .swift Dateien und bauen das "Gehirn" der App
          xcrun -sdk iphoneos swiftc \
            -target arm64-apple-ios15.0 \
            -o IriunClone \
            *.swift
          
          # 2. Wir erstellen die Struktur, die Sideloadly zum Installieren braucht
          mkdir -p Payload/IriunClone.app
          
          # 3. Wir verschieben das Programm und die Info-Datei an den richtigen Platz
          mv IriunClone Payload/IriunClone.app/
          # Wir stellen sicher, dass info.plist als Info.plist (großes I) im Paket landet
          cp info.plist Payload/IriunClone.app/Info.plist
          
          # 4. Wir erstellen die fertige IPA-Datei
          zip -r IriunClone.ipa Payload
    artifacts:
      - "*.ipa"
