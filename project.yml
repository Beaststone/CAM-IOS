name: IriunClone

options:
  bundleIdPrefix: com.mike

settings:
  BASE_SDK: iphoneos
  IPHONEOS_DEPLOYMENT_TARGET: 15.0

targets:
  IriunClone:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: AppState.swift
      - path: BlackScreenOverlayView.swift
      - path: CameraSessionManager.swift
      - path: ContentView.swift
      - path: ControlChannelClient.swift
      - path: DiscoveryClient.swift
      - path: H264Encoder.swift
      - path: IriunCloneApp.swift
      - path: Models.swift
      - path: StreamController.swift
      - path: VideoStreamClient.swift
    info:
      path: info.plist
      properties:
        NSCameraUsageDescription: "Wir brauchen die Kamera, um das Video an deinen PC zu senden."
        NSLocalNetworkUsageDescription: "Wir brauchen Zugriff auf dein lokales Netzwerk, um den Videostream an deinen PC zu senden."
        NSMicrophoneUsageDescription: "Mikrofon wird nicht genutzt, aber iOS verlangt ggf. eine Beschreibung."
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.mike.iriunclone
      PRODUCT_NAME: IriunClone
      SWIFT_VERSION: 5.0
      TARGETED_DEVICE_FAMILY: "1"
    scheme:
      testTargets: []


